name: Build Release Artifacts

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node22-win-x64
            artifact: win-x64
          - os: macos-26-intel
            target: node22-macos-x64
            artifact: macos-x64
          - os: macos-latest
            target: node22-macos-arm64
            artifact: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build binary
        run: npx @yao-pkg/pkg shuffler.js --targets ${{ matrix.target }} --output dist/delta-shuffler

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
  
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Debug
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "ref: ${{ github.ref }}"
          ls -la artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} artifacts/* --title "${{ github.ref_name }}"