name: Build Windows Test

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows binary
        run: npx @yao-pkg/pkg shuffler.js --targets node22-win-x64 --output dist/delta-shuffler.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/delta-shuffler.exe

  build-macos-x64:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS x64 binary
        run: npx @yao-pkg/pkg shuffler.js --targets node22-macos-x64 --output dist/delta-shuffler-x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-binary
          path: dist/delta-shuffler-x64

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS ARM binary
        run: npx @yao-pkg/pkg shuffler.js --targets node22-macos-arm64 --output dist/delta-shuffler-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binary
          path: dist/delta-shuffler-arm64
  
  release:
    needs: [build-windows, build-macos-x64, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/* --title "${{ github.ref_name }}" --generate-notes