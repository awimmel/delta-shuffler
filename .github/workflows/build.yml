name: Build Windows Test

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows binary
        run: npx @yao-pkg/pkg shuffler.js --targets node22-win-x64 --output dist/delta-shuffler.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/delta-shuffler.exe --title "${{ github.ref_name }}" --generate-notes